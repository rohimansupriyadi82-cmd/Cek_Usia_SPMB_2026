<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PPDB Dashboard 2026 | Galaxy Mode</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #00f2fe; }
        body { margin: 0; padding: 20px; min-height: 100vh; font-family: 'Plus Jakarta Sans', sans-serif; background: radial-gradient(ellipse at bottom, #1B2735 0%, #090A0F 100%); color: white; display: flex; align-items: center; justify-content: center; }
        body::before { content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: url('https://www.transparenttextures.com/patterns/stardust.png'); opacity: 0.4; z-index: -1; }
        .container { width: 100%; max-width: 900px; background: rgba(10, 15, 30, 0.6); backdrop-filter: blur(15px); border: 1px solid rgba(0, 242, 254, 0.3); border-radius: 24px; padding: 30px; box-shadow: 0 0 30px rgba(0, 242, 254, 0.1); }
        .logo { height: 60px; display: block; margin: 0 auto 20px; }
        .nav { display: flex; gap: 10px; margin-bottom: 25px; }
        .tab-btn { background: rgba(0,0,0,0.3); border: 1px solid var(--primary); color: var(--primary); padding: 12px 20px; border-radius: 12px; cursor: pointer; transition: 0.3s; }
        .tab-btn.active { background: var(--primary); color: black; font-weight: 800; }
        .content { display: none; }
        .content.active { display: block; }
        input { width: 100%; padding: 14px; margin: 8px 0 15px; border-radius: 12px; border: 1px solid #2d3748; background: rgba(0,0,0,0.4); color: white; box-sizing: border-box; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; font-size: 0.8rem; }
        th { color: var(--primary); padding: 10px; border-bottom: 1px solid #2d3748; text-align: left; }
        td { padding: 10px; border-bottom: 1px solid #1e293b; }
        .btn-action { background: var(--primary); border: none; padding: 14px; border-radius: 12px; font-weight: bold; cursor: pointer; width: 100%; color: black; }
        .btn-del { background: #ef4444; color: white; border: none; padding: 5px 8px; border-radius: 6px; cursor: pointer; }
        .btn-excel { background: #10b981; color: white; border: none; padding: 12px 24px; border-radius: 12px; margin-top: 20px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <img src="https://freeimghost.com/images/2026/01/22/Kabupaten-Bekasi.md.png" class="logo" alt="Logo Kabupaten Bekasi">
    <div class="nav">
        <button class="tab-btn active" onclick="showTab('input')">🚀 Cek Usia</button>
        <button class="tab-btn" onclick="showTab('data')">🌌 Data Siswa</button>
    </div>

    <div id="input" class="content active">
        <label>Nama Lengkap</label>
        <input type="text" id="nama" placeholder="Masukkan nama...">
        <label>Tempat Lahir</label>
        <input type="text" id="tempat" placeholder="Contoh: Bekasi">
        <label>Tanggal Lahir</label>
        <input type="date" id="tgl">
        <button class="btn-action" onclick="tambahData()">Proses & Simpan Data</button>
    </div>

    <div id="data" class="content">
        <table id="tabelSiswa">
            <thead>
                <tr>
                    <th>Nama</th>
                    <th>TTL</th>
                    <th>Usia</th>
                    <th>Keterangan</th>
                    <th>Aksi</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
        <button class="btn-excel" onclick="exportExcel()">Unduh Laporan Excel</button>
    </div>
</div>

<script>
    let siswaList = JSON.parse(localStorage.getItem('siswaPPDB')) || [];
    window.onload = renderTable;

    function formatTanggal(dateStr) {
        const d = new Date(dateStr);
        const bulan = ["Januari", "Februari", "Maret", "April", "Mei", "Juni", "Juli", "Agustus", "September", "Oktober", "November", "Desember"];
        return `${d.getDate()} ${bulan[d.getMonth()]} ${d.getFullYear()}`;
    }

    function tentukanJenjang(y) {
        if (y >= 6) return "SD Kelas 1";
        if (y === 5) return "TK B";
        if (y === 4) return "TK A";
        return "Belum Cukup";
    }

    function showTab(id) {
        document.querySelectorAll('.content').forEach(c => c.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        event.target.classList.add('active');
    }

    function renderTable() {
        const tbody = document.querySelector('#tabelSiswa tbody');
        tbody.innerHTML = '';
        siswaList.forEach((s, index) => {
            tbody.innerHTML += `<tr>
                <td>${s.Nama}</td>
                <td>${s.Tempat}, ${formatTanggal(s.TglLahir)}</td>
                <td>${s.Usia}</td>
                <td><strong style="color:var(--primary)">${s.Jenjang}</strong></td>
                <td><button class="btn-del" onclick="hapusData(${index})">Hapus</button></td>
            </tr>`;
        });
    }

    function tambahData() {
        const nama = document.getElementById('nama').value;
        const tempat = document.getElementById('tempat').value;
        const tglInput = document.getElementById('tgl').value;
        
        if(!nama || !tempat || !tglInput) return alert("Harap lengkapi semua data!");

        const dob = new Date(tglInput);
        const target = new Date('2026-07-01');
        let y = target.getFullYear() - dob.getFullYear();
        let m = target.getMonth() - dob.getMonth();
        let d = target.getDate() - dob.getDate();
        if (d < 0) { m--; d += 30; }
        if (m < 0) { y--; m += 12; }

        const usiaStr = `${y} Thn ${m} Bln ${d} Hari`;
        const jenjang = tentukanJenjang(y);
        
        siswaList.push({ Nama: nama, Tempat: tempat, TglLahir: tglInput, Usia: usiaStr, Jenjang: jenjang });
        localStorage.setItem('siswaPPDB', JSON.stringify(siswaList));
        renderTable();
        alert("Data tersimpan!");
        document.getElementById('nama').value = '';
    }

    function hapusData(index) {
        if(confirm("Yakin ingin menghapus?")) {
            siswaList.splice(index, 1);
            localStorage.setItem('siswaPPDB', JSON.stringify(siswaList));
            renderTable();
        }
    }

    function exportExcel() {
        const dataExport = siswaList.map((s, i) => ({
            "No": i + 1,
            "Nama": s.Nama,
            "Tempat Lahir": s.Tempat,
            "Tanggal Lahir": formatTanggal(s.TglLahir),
            "Usia (1 Jul 26)": s.Usia,
            "Keterangan Jenjang": s.Jenjang
        }));
        const ws = XLSX.utils.json_to_sheet(dataExport);
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, "Data Siswa");
        XLSX.writeFile(wb, "Data_PPDB_2026.xlsx");
    }
</script>
</body>
</html>
